name: Monitor Production

on:
  schedule:
    - cron: '7,37 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: monitor-production
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      API_URL: https://joblens-preview-api.onrender.com
      FRONTEND_URL: https://joblens-miniapp.vercel.app
      CHINA_URL: https://43-142-15-246.sslip.io
      MONITORING_TOKEN: ${{ secrets.MONITORING_TOKEN }}
      CHINA_MONITORING_TOKEN: ${{ secrets.CHINA_MONITORING_TOKEN }}
    steps:
      - name: Check frontend availability
        shell: bash
        run: |
          set -euo pipefail
          frontend_file="$(mktemp)"
          frontend_code="$(curl --silent --show-error --location --retry 3 --retry-all-errors \
            --connect-timeout 20 --max-time 120 --output "$frontend_file" --write-out '%{http_code}' \
            "$FRONTEND_URL/")"
          test "$frontend_code" = '200'
          grep -F '<title>职镜 JobLens - 岗位风险智能检测</title>' "$frontend_file" >/dev/null
          grep -F '<div id="root"></div>' "$frontend_file" >/dev/null
          script_path="$(grep -oE 'src="/assets/[^"]+\.js"' "$frontend_file" | head -1 | cut -d'"' -f2)"
          test -n "$script_path"
          curl --silent --show-error --fail --location --retry 3 --retry-all-errors \
            --connect-timeout 20 --max-time 120 --output /dev/null \
            "$FRONTEND_URL$script_path"
          admin_code="$(curl --silent --show-error --location --retry 3 --retry-all-errors \
            --connect-timeout 20 --max-time 120 --output /dev/null --write-out '%{http_code}' \
            "$FRONTEND_URL/admin")"
          test "$admin_code" = '200'

      - name: Check health and operational thresholds
        shell: bash
        run: |
          set -euo pipefail
          test -n "$MONITORING_TOKEN"

          health_file="$(mktemp)"
          health_code="$(curl --silent --show-error --location --retry 3 --retry-all-errors \
            --connect-timeout 20 --max-time 120 --output "$health_file" --write-out '%{http_code}' \
            "$API_URL/api/health")"
          cat "$health_file" | jq '{status, dependencies}'
          test "$health_code" = '200'
          test "$(jq -r '.status' "$health_file")" = 'ok'

          metrics_file="$(mktemp)"
          metrics_code="$(curl --silent --show-error --location --retry 3 --retry-all-errors \
            --connect-timeout 20 --max-time 120 --output "$metrics_file" --write-out '%{http_code}' \
            -H "Authorization: Bearer $MONITORING_TOKEN" \
            "$API_URL/api/internal/metrics?window_minutes=30")"
          test "$metrics_code" = '200'
          jq '{window_minutes, requests, frontend_errors, ai_budget}' "$metrics_file"

          backup_with_monitoring_token_code="$(curl --silent --show-error --location \
            --connect-timeout 20 --max-time 120 --output /dev/null --write-out '%{http_code}' \
            -H "Authorization: Bearer $MONITORING_TOKEN" \
            "$API_URL/api/internal/backup")"
          test "$backup_with_monitoring_token_code" = '401'
          admin_with_monitoring_token_code="$(curl --silent --show-error --location \
            --connect-timeout 20 --max-time 120 --output /dev/null --write-out '%{http_code}' \
            -H "Authorization: Bearer $MONITORING_TOKEN" \
            "$API_URL/api/admin/overview?days=1")"
          test "$admin_with_monitoring_token_code" = '401'

          total="$(jq -r '.requests.total' "$metrics_file")"
          success_rate="$(jq -r '.requests.success_rate // 1' "$metrics_file")"
          server_errors="$(jq -r '.requests.server_errors' "$metrics_file")"
          frontend_errors="$(jq -r '.frontend_errors' "$metrics_file")"
          budget_ratio="$(jq -r '.ai_budget.usage_ratio' "$metrics_file")"

          if [ "$total" -ge 10 ] && awk "BEGIN {exit !($success_rate < 0.95)}"; then
            echo "API success rate below 95%: $success_rate" >&2
            exit 1
          fi
          if [ "$server_errors" -ge 3 ]; then
            echo "API produced $server_errors server errors in 30 minutes" >&2
            exit 1
          fi
          if [ "$frontend_errors" -ge 5 ]; then
            echo "Frontend reported $frontend_errors errors in 30 minutes" >&2
            exit 1
          fi
          if awk "BEGIN {exit !($budget_ratio >= 0.80)}"; then
            echo "AI daily budget reached ${budget_ratio}; investigate usage before the hard limit" >&2
            exit 1
          fi

      - name: Check isolated China production
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CHINA_MONITORING_TOKEN"
          frontend_file="$(mktemp)"
          curl --fail --silent --show-error --location --retry 3 --retry-all-errors \
            --connect-timeout 20 --max-time 120 "$CHINA_URL/" > "$frontend_file"
          grep -F '<title>职镜 JobLens - 岗位风险智能检测</title>' "$frontend_file" >/dev/null
          grep -F '<div id="root"></div>' "$frontend_file" >/dev/null
          health_file="$(mktemp)"
          curl --fail --silent --show-error --retry 3 --retry-all-errors \
            --connect-timeout 20 --max-time 120 "$CHINA_URL/api/health" > "$health_file"
          test "$(jq -r '.status' "$health_file")" = 'ok'
          test "$(jq -r '.dependencies.database' "$health_file")" = 'true'
          test "$(jq -r '.dependencies.redis' "$health_file")" = 'true'
          metrics_file="$(mktemp)"
          curl --fail --silent --show-error --retry 3 --retry-all-errors \
            --connect-timeout 20 --max-time 120 \
            -H "Authorization: Bearer $CHINA_MONITORING_TOKEN" \
            "$CHINA_URL/api/internal/metrics?window_minutes=30" > "$metrics_file"
          jq '{window_minutes, requests, frontend_errors, ai_budget}' "$metrics_file"
