name: Provision Render Preview

on:
  workflow_dispatch:
    inputs:
      diagnostic:
        description: Print Render resource states without changing them
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
      RENDER_API: https://api.render.com/v1
      RENDER_REGION: oregon
      RENDER_DATABASE_NAME: joblens-preview-db
      RENDER_KEY_VALUE_NAME: joblens-preview-cache
      RENDER_SERVICE_NAME: joblens-preview-api
      VERCEL_ORIGIN: https://joblens-miniapp.vercel.app
      DIAGNOSTIC: ${{ inputs.diagnostic }}
    steps:
      - name: Provision Render resources
        shell: bash
        run: |
          set -euo pipefail

          render_status() {
            curl --connect-timeout 10 --max-time 30 --silent --show-error --output /dev/null --write-out '%{http_code}' \
              -H 'Accept: application/json' \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "$RENDER_API/$1"
          }

          owners_status="$(render_status 'owners?limit=1')"
          users_status="$(render_status users)"
          services_status="$(render_status 'services?limit=1')"
          echo "Render API endpoint status - owners: $owners_status, users: $users_status, services: $services_status"
          test "$owners_status" = '200'

          request() {
            curl --connect-timeout 10 --max-time 30 --fail --silent --show-error --retry 3 --retry-all-errors \
              -H 'Accept: application/json' \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "$@"
          }

          owner_json="$(request "$RENDER_API/owners?limit=1")"
          owner_id="$(jq -r '.[0].owner.id // .[0].id // empty' <<<"$owner_json")"
          test -n "$owner_id"

          existing_id() {
            local endpoint="$1"
            local name="$2"
            local resource="$3"
            request "$RENDER_API/$endpoint?name=$name&ownerId=$owner_id&limit=1" |
              jq -r ".[0].$resource.id // .[0].id // empty"
          }

          if [ "$DIAGNOSTIC" = 'true' ]; then
            echo 'Render resource diagnostic:'
            request "$RENDER_API/postgres?name=$RENDER_DATABASE_NAME&ownerId=$owner_id&limit=1" |
              jq 'map(.postgres // .) | map({id, name, status, plan, region, expiresAt})'
            request "$RENDER_API/key-value?name=$RENDER_KEY_VALUE_NAME&ownerId=$owner_id&limit=1" |
              jq 'map(.keyValue // .) | map({id, name, status, plan, region})'
            request "$RENDER_API/services?name=$RENDER_SERVICE_NAME&ownerId=$owner_id&limit=1" |
              jq 'map(.service // .) | map({id, name, suspended, url})'
            service_id="$(existing_id services "$RENDER_SERVICE_NAME" service)"
            request "$RENDER_API/services/$service_id/deploys?limit=3" |
              jq 'map(.deploy // .) | map({id, status, trigger, createdAt, startedAt, finishedAt, commit})'
            request "$RENDER_API/logs?ownerId=$owner_id&resource=$service_id&type=build&limit=100" |
              jq '(.logs // .)[]? | .message // .text // .'
            exit 0
          fi

          database_id="$(existing_id postgres "$RENDER_DATABASE_NAME" postgres)"
          if [ -z "$database_id" ]; then
            echo 'Creating free PostgreSQL instance'
            database_id="$(request -X POST -H 'Content-Type: application/json' \
              --data "$(jq -nc --arg name "$RENDER_DATABASE_NAME" --arg ownerId "$owner_id" --arg region "$RENDER_REGION" '{name:$name,ownerId:$ownerId,plan:"free",region:$region,version:"16"}')" \
              "$RENDER_API/postgres" | jq -r '.id')"
          fi

          key_value_id="$(existing_id key-value "$RENDER_KEY_VALUE_NAME" keyValue)"
          if [ -z "$key_value_id" ]; then
            echo 'Creating free Key Value instance'
            key_value_id="$(request -X POST -H 'Content-Type: application/json' \
              --data "$(jq -nc --arg name "$RENDER_KEY_VALUE_NAME" --arg ownerId "$owner_id" --arg region "$RENDER_REGION" '{name:$name,ownerId:$ownerId,plan:"free",region:$region,persistenceMode:"off"}')" \
              "$RENDER_API/key-value" | jq -r '.id')"
          fi

          for _ in {1..80}; do
            database_url="$(request "$RENDER_API/postgres/$database_id/connection-info" | jq -r '.internalConnectionString // empty')"
            redis_url="$(request "$RENDER_API/key-value/$key_value_id/connection-info" | jq -r '.internalConnectionString // empty')"
            if [ -n "$database_url" ] && [ -n "$redis_url" ]; then
              break
            fi
            sleep 15
          done
          test -n "${database_url:-}"
          test -n "${redis_url:-}"

          service_id="$(existing_id services "$RENDER_SERVICE_NAME" service)"
          if [ -z "$service_id" ]; then
            echo 'Creating free web service'
            payload="$(jq -nc \
              --arg ownerId "$owner_id" \
              --arg databaseUrl "$database_url" \
              --arg redisUrl "$redis_url" \
              --arg siliconflowApiKey "$SILICONFLOW_API_KEY" \
              --arg corsOrigin "$VERCEL_ORIGIN" \
              '{type:"web_service",name:"joblens-preview-api",ownerId:$ownerId,repo:"https://github.com/KeithYww/joblens-miniapp-project",branch:"main",autoDeploy:"yes",rootDir:"backend",envVars:[{key:"NODE_ENV",value:"production"},{key:"DATABASE_URL",value:$databaseUrl},{key:"REDIS_URL",value:$redisUrl},{key:"REQUIRE_DATABASE",value:"true"},{key:"REQUIRE_REDIS",value:"true"},{key:"TRUST_PROXY",value:"1"},{key:"BODY_LIMIT_BYTES",value:"10485760"},{key:"CORS_ORIGIN",value:$corsOrigin},{key:"AI_PROVIDER",value:"siliconflow"},{key:"SILICONFLOW_API_KEY",value:$siliconflowApiKey},{key:"SILICONFLOW_MODEL",value:"Qwen/Qwen2.5-72B-Instruct"},{key:"SILICONFLOW_VISION_MODEL",value:"Qwen/Qwen3-VL-8B-Instruct"}],serviceDetails:{runtime:"node",plan:"free",region:"oregon",healthCheckPath:"/api/health",envSpecificDetails:{buildCommand:"npm ci --include=dev && npx prisma generate && npm run build",startCommand:"npm run prisma:deploy && npm start"}}}')"
            service_id="$(request -X POST -H 'Content-Type: application/json' --data "$payload" "$RENDER_API/services" | jq -r '.id')"
          else
            request -X PATCH -H 'Content-Type: application/json' \
              --data "$(jq -nc \
                --arg databaseUrl "$database_url" \
                --arg redisUrl "$redis_url" \
                --arg siliconflowApiKey "$SILICONFLOW_API_KEY" \
                --arg corsOrigin "$VERCEL_ORIGIN" \
                '{envVars:[{key:"NODE_ENV",value:"production"},{key:"DATABASE_URL",value:$databaseUrl},{key:"REDIS_URL",value:$redisUrl},{key:"REQUIRE_DATABASE",value:"true"},{key:"REQUIRE_REDIS",value:"true"},{key:"TRUST_PROXY",value:"1"},{key:"BODY_LIMIT_BYTES",value:"10485760"},{key:"CORS_ORIGIN",value:$corsOrigin},{key:"AI_PROVIDER",value:"siliconflow"},{key:"SILICONFLOW_API_KEY",value:$siliconflowApiKey},{key:"SILICONFLOW_MODEL",value:"Qwen/Qwen2.5-72B-Instruct"},{key:"SILICONFLOW_VISION_MODEL",value:"Qwen/Qwen3-VL-8B-Instruct"}],serviceDetails:{envSpecificDetails:{buildCommand:"npm ci --include=dev && npx prisma generate && npm run build",startCommand:"npm run prisma:deploy && npm start"}}}')" \
              "$RENDER_API/services/$service_id" >/dev/null
            request -X POST -H 'Content-Type: application/json' --data '{"clearCache":"clear"}' "$RENDER_API/services/$service_id/deploys" >/dev/null
          fi

          for _ in {1..100}; do
            service_json="$(request "$RENDER_API/services/$service_id")"
            service_url="$(jq -r '.service.url // .url // empty' <<<"$service_json")"
            service_state="$(jq -r '.service.suspended // .suspended // empty' <<<"$service_json")"
            if [ -n "$service_url" ] && [ "$service_state" = "not_suspended" ]; then
              health="$(curl --silent --show-error --max-time 20 --write-out '%{http_code}' --output /tmp/health "$service_url/api/health" || true)"
              if [ "$health" = "200" ]; then
                echo "Render API ready: $service_url"
                exit 0
              fi
            fi
            sleep 15
          done

          echo 'Render service did not become healthy before the workflow timeout.' >&2
          exit 1
