name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: joblens
          POSTGRES_PASSWORD: joblens
          POSTGRES_DB: joblens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U joblens"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://joblens:joblens@127.0.0.1:5432/joblens
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run prisma:deploy
      - run: npm run build
      - run: npm test
      - run: npm audit --omit=dev

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-h5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-h5/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm audit --omit=dev
