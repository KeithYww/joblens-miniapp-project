name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: joblens
          POSTGRES_PASSWORD: joblens
          POSTGRES_DB: joblens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U joblens"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://joblens:joblens@127.0.0.1:5432/joblens
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run prisma:deploy
      - run: npm run build
      - run: npm test
      - run: npm run test:redis
      - run: npm audit --omit=dev

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-h5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-h5/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run lint
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm audit --omit=dev

  deployment-package:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      PUBLIC_ORIGIN: http://127.0.0.1
      SITE_ADDRESS: :80
      POSTGRES_DB: joblens
      POSTGRES_USER: joblens
      POSTGRES_PASSWORD: ci-only-password
      AI_PROVIDER: rule-based
      CAPTCHA_MODE: disabled
      MONITORING_TOKEN: ci-monitoring-token-with-sufficient-entropy
      BACKUP_TOKEN: ci-backup-token-with-sufficient-entropy
      ADMIN_TOKEN: ci-admin-token-with-sufficient-entropy
      BUILD_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose
        run: docker compose --project-name deploy --env-file /dev/null -f deploy/docker-compose.yml config --quiet
      - name: Build production containers
        run: docker compose --project-name deploy --env-file /dev/null -f deploy/docker-compose.yml build
