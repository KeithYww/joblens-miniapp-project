name: Backup Production Data

on:
  schedule:
    - cron: '30 19 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backup-render-postgres
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      BACKUP_TOKEN: ${{ secrets.BACKUP_TOKEN }}
      BACKUP_ENCRYPTION_PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}
      API_BASE_URL: https://joblens-preview-api.onrender.com
    steps:
      - name: Create encrypted application backup
        shell: bash
        run: |
          set -euo pipefail
          test -n "$BACKUP_TOKEN"
          test -n "$BACKUP_ENCRYPTION_PASSPHRASE"

          timestamp="$(date -u +'%Y-%m-%dT%H-%M-%SZ')"
          mkdir -p backups
          snapshot="backups/joblens-$timestamp.json"
          encrypted="$snapshot.enc"
          curl --connect-timeout 15 --max-time 180 --fail --silent --show-error \
            --retry 5 --retry-all-errors --retry-delay 15 \
            -H 'Accept: application/json' \
            -H "Authorization: Bearer $BACKUP_TOKEN" \
            "$API_BASE_URL/api/internal/backup" > "$snapshot"
          jq -e '
            .schema_version == "joblens-backup-v1" and
            (.generated_at | type == "string") and
            (.counts.job_reports == (.data.job_reports | length)) and
            (.counts.hr_analyses == (.data.hr_analyses | length)) and
            (.counts.interview_feedbacks == (.data.interview_feedbacks | length)) and
            (.counts.report_feedbacks == (.data.report_feedbacks | length)) and
            ([.data[][] | has("ip_address")] | all(. == false))
          ' "$snapshot" >/dev/null
          openssl enc -aes-256-cbc -pbkdf2 -iter 200000 -salt \
            -in "$snapshot" -out "$encrypted" -pass env:BACKUP_ENCRYPTION_PASSPHRASE
          rm -f "$snapshot"
          sha256sum "$encrypted" > "$encrypted.sha256"
          verify_snapshot="$(mktemp)"
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 200000 \
            -in "$encrypted" -out "$verify_snapshot" -pass env:BACKUP_ENCRYPTION_PASSPHRASE
          jq -e '.schema_version == "joblens-backup-v1"' "$verify_snapshot" >/dev/null
          rm -f "$verify_snapshot"

      - name: Upload encrypted backup
        uses: actions/upload-artifact@v4
        with:
          name: production-data-backup-${{ github.run_id }}
          path: |
            backups/*.json.enc
            backups/*.json.enc.sha256
          if-no-files-found: error
          retention-days: 14
