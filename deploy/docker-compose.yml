services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      TRUST_PROXY: 1
      BODY_LIMIT_BYTES: ${BODY_LIMIT_BYTES:-10485760}
      CORS_ORIGIN: https://${DOMAIN}
      REQUIRE_DATABASE: "true"
      REQUIRE_REDIS: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      AI_PROVIDER: ${AI_PROVIDER}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      SILICONFLOW_MODEL: ${SILICONFLOW_MODEL:-}
      SILICONFLOW_VISION_MODEL: ${SILICONFLOW_VISION_MODEL:-Qwen/Qwen3-VL-8B-Instruct}
      QWENCLOUD_API_KEY: ${QWENCLOUD_API_KEY:-}
      QWENCLOUD_MODEL: ${QWENCLOUD_MODEL:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
      CAPTCHA_BYPASS: "false"
      DATA_CLEANUP_INTERVAL_MS: ${DATA_CLEANUP_INTERVAL_MS:-3600000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [internal]

  web:
    build:
      context: ..
      dockerfile: web-h5/Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY}
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
