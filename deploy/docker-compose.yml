services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  backend:
    image: joblens-backend:${BUILD_SHA:-development}
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_VERSION: ${BUILD_SHA:-development}
      TRUST_PROXY: 1
      BODY_LIMIT_BYTES: ${BODY_LIMIT_BYTES:-10485760}
      CORS_ORIGIN: ${PUBLIC_ORIGIN}
      REQUIRE_DATABASE: "true"
      REQUIRE_REDIS: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      AI_PROVIDER: ${AI_PROVIDER}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      SILICONFLOW_MODEL: ${SILICONFLOW_MODEL:-}
      SILICONFLOW_VISION_MODEL: ${SILICONFLOW_VISION_MODEL:-Qwen/Qwen3-VL-8B-Instruct}
      SILICONFLOW_VISION_TIMEOUT_MS: ${SILICONFLOW_VISION_TIMEOUT_MS:-60000}
      QWENCLOUD_API_KEY: ${QWENCLOUD_API_KEY:-}
      QWENCLOUD_MODEL: ${QWENCLOUD_MODEL:-}
      AI_CALLS_ENABLED: ${AI_CALLS_ENABLED:-true}
      AI_DAILY_CREDIT_LIMIT: ${AI_DAILY_CREDIT_LIMIT:-300}
      AI_OCR_CREDIT_COST: ${AI_OCR_CREDIT_COST:-3}
      AI_ANALYSIS_CREDIT_COST: ${AI_ANALYSIS_CREDIT_COST:-1}
      ANON_DAILY_OCR_LIMIT: ${ANON_DAILY_OCR_LIMIT:-3}
      ANON_DAILY_ANALYSIS_LIMIT: ${ANON_DAILY_ANALYSIS_LIMIT:-3}
      IP_DAILY_OCR_LIMIT: ${IP_DAILY_OCR_LIMIT:-20}
      IP_DAILY_ANALYSIS_LIMIT: ${IP_DAILY_ANALYSIS_LIMIT:-30}
      AI_MAX_TOTAL_CONCURRENCY: ${AI_MAX_TOTAL_CONCURRENCY:-4}
      AI_MAX_OCR_CONCURRENCY: ${AI_MAX_OCR_CONCURRENCY:-2}
      AI_MAX_ANALYSIS_CONCURRENCY: ${AI_MAX_ANALYSIS_CONCURRENCY:-3}
      OCR_CACHE_TTL_SECONDS: ${OCR_CACHE_TTL_SECONDS:-86400}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      CAPTCHA_MODE: ${CAPTCHA_MODE:-disabled}
      CAPTCHA_BYPASS: "false"
      DATA_CLEANUP_INTERVAL_MS: ${DATA_CLEANUP_INTERVAL_MS:-3600000}
      MONITORING_TOKEN: ${MONITORING_TOKEN}
      BACKUP_TOKEN: ${BACKUP_TOKEN}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [internal]

  web:
    image: joblens-web:${BUILD_SHA:-development}
    build:
      context: ..
      dockerfile: web-h5/Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-}
        BUILD_SHA: ${BUILD_SHA:-development}
    restart: unless-stopped
    command: ["caddy", "run", "--config", "/etc/caddy/${CADDY_CONFIG_FILE:-Caddyfile}", "--adapter", "caddyfile"]
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      ACME_EMAIL: ${ACME_EMAIL:-}
      CADDY_CONFIG_FILE: ${CADDY_CONFIG_FILE:-Caddyfile}
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ${CERTBOT_DIR:-/opt/joblens/certbot}:/etc/letsencrypt:ro
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
